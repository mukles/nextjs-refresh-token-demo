services:
  mongo:
    image: mongo:7
    container_name: refresh-token-mongo
    restart: unless-stopped
    # Host 27018 -> container 27017 to avoid colliding with a local Homebrew
    # mongod that may already own 27017.
    ports:
      - "27018:27017"
    # Prisma's MongoDB connector requires a replica set (it uses transactions).
    # Run a single-node replica set and let the healthcheck auto-initiate it.
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval "try { rs.status().ok }
        catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok }"
      interval: 5s
      timeout: 30s
      start_period: 5s
      retries: 30
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
